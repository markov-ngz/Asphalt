x-flink-env: &flink-env
  FLINK_PROPERTIES: |
    jobmanager.rpc.address: jobmanager
    taskmanager.numberOfTaskSlots: 8
    state.backend.type: forst

    state.checkpoints.dir: s3://flink/checkpoints

    execution.checkpointing.interval: 60000
    execution.checkpointing.mode: EXACTLY_ONCE
    execution.checkpointing.incremental:true
    execution.checkpointing.dir:s3://flink/checkpoints
    execution.checkpointing.savepoint-dir:s3://flink/savepoints

    state.backend.forst.sync.enforce-local: false
    state.backend.forst.cache.dir: /tmp/forst-cache

    s3.endpoint: http://rustfs:9000
    s3.path.style.access: true
    s3.access-key: admin
    s3.secret-key: adminsecret

    metrics.reporters: prom
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prom.port: 9250-9260

services:
  jobmanager:
    build: .
    container_name: flink-jobmanager
    ports:
      - "127.0.0.1:8081:8081"
    command: jobmanager
    environment:
      <<: *flink-env
    networks:
      - asphalt

  taskmanager:
    build: .
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      <<: *flink-env

    networks:
      - asphalt

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.82
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "127.0.0.1:9000:9000" # S3 API port
      - "127.0.0.1:9001:9001" # Console port
    environment:
      - RUSTFS_VOLUMES=/data/rustfs0
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=admin
      - RUSTFS_SECRET_KEY=adminsecret
      - RUSTFS_OBS_LOGGER_LEVEL=info
      - RUSTFS_TLS_PATH=/opt/tls
      # Object Cache
      - RUSTFS_OBJECT_CACHE_ENABLE=true
      - RUSTFS_OBJECT_CACHE_TTL_SECS=300

    volumes:
      - rustfs_data_0:/data/rustfs0
      - logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - asphalt
  # RustFS volume permissions fixer service
  volume-permission-helper:
    image: alpine
    volumes:
      - rustfs_data_0:/data0
      - logs:/logs
    command: >
      sh -c "
        chown -R 10001:10001 /data0 /logs &&
        echo 'Volume Permissions fixed' &&
        exit 0
      "
    restart: "no"

    networks:
      - asphalt

  bucket-setup:
    image: amazon/aws-cli:2.33.17
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: adminsecret
      AWS_ENDPOINT_URL: http://rustfs:9000
    entrypoint: "/bin/sh"
    command:
      - "-c"
      - |
        echo Checking if RustFS bucket exists...
        if aws s3 ls "s3://flink" 2>&1 | grep -q 'NoSuchBucket'; then
            echo Bucket does not exist. Creating RustFS bucket...
            aws s3 mb s3://flink
        else
            echo Bucket already exists. Skipping creation.
        fi

        aws s3 ls
        echo Bucket setup complete.
    networks:
      - asphalt
      
networks:
  asphalt:
    name: asphalt
    external: true

volumes:
  rustfs_data_0:
  logs: