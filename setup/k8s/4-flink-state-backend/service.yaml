apiVersion: v1
kind: Service
metadata:
  name: rustfs
  namespace: asphalt
spec:
  type: ClusterIP
  selector:
    app: rustfs
  ports:
    - name: s3-api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001

# kubectl port-forward service/rustfs 9001:9001