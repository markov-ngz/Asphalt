apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: asphalt
data:
  KAFKA_NODE_ID: "1" 
  KAFKA_PROCESS_ROLES: "broker,controller"

  KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
  KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

  KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
  KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka.asphalt.svc.cluster.local:29092,EXTERNAL://localhost:9092"

  KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka.asphalt.svc.cluster.local:29093"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
  KAFKA_NUM_PARTITIONS: "3"

