---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink
  namespace: asphalt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-role
  namespace: asphalt
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "delete", "edit", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "delete", "edit", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-role-binding
  namespace: asphalt
subjects:
  - kind: ServiceAccount
    name: flink
    namespace: asphalt
roleRef:
  kind: Role
  name: flink-role
  apiGroup: rbac.authorization.k8s.io