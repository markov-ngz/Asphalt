name: Publish package to GitHub Packages

on:
  workflow_call:
    inputs:
      project_dir:
        description: 'Folder to cd on'
        required: true
        type: string
      deploy_command:
        description: 'Command to deploy the package'
        default: mvn --batch-mode deploy
        required: true
        type: string
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Publish package
        run: |
          ${{ inputs.deploy_command }} 
        working-directory: ${{ inputs.project_dir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_PACKAGE }}